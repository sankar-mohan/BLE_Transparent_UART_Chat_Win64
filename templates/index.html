<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLE Terminal | UART Interface</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-section">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6.5 6.5c1.5-1.5 3.5-2.5 5.5-2.5s4 1 5.5 2.5"/>
                        <path d="M8.5 8.5c1-1 2.5-1.5 3.5-1.5s2.5.5 3.5 1.5"/>
                        <circle cx="12" cy="12" r="1.5"/>
                        <path d="M8.5 15.5c1 1 2.5 1.5 3.5 1.5s2.5-.5 3.5-1.5"/>
                        <path d="M6.5 17.5c1.5 1.5 3.5 2.5 5.5 2.5s4-1 5.5-2.5"/>
                    </svg>
                </div>
                <div class="logo-text">
                    <h1>BLE Terminal</h1>
                    <span>UART Interface v1.0</span>
                </div>
            </div>
            <div class="header-controls">
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Toggle theme">
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
                <div class="connection-status">
                    <div class="status-indicator" id="statusIndicator"></div>
                    <span id="statusText">DISCONNECTED</span>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Scanner Panel -->
            <section class="panel scanner-panel">
                <div class="panel-header">
                    <div class="panel-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                        </svg>
                        Device Scanner
                    </div>
                </div>
                <div class="panel-content">
                    <button class="scan-button" id="scanBtn" onclick="scanBLE()">
                        <svg class="scan-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                        </svg>
                        <span id="scanBtnText">Scan for Devices</span>
                    </button>
                    <div class="device-list" id="deviceList">
                        <div class="empty-state" id="emptyState">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M6.5 6.5c1.5-1.5 3.5-2.5 5.5-2.5s4 1 5.5 2.5"/>
                                <path d="M8.5 8.5c1-1 2.5-1.5 3.5-1.5s2.5.5 3.5 1.5"/>
                                <circle cx="12" cy="12" r="1.5"/>
                                <path d="M8.5 15.5c1 1 2.5 1.5 3.5 1.5s2.5-.5 3.5-1.5"/>
                                <path d="M6.5 17.5c1.5 1.5 3.5 2.5 5.5 2.5s4-1 5.5-2.5"/>
                            </svg>
                            <p>Click scan to discover nearby BLE devices</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Chat Panel -->
            <section class="panel chat-panel" id="chatPanel">
                <div class="panel-header">
                    <div class="panel-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                        </svg>
                        UART Terminal
                    </div>
                    <div class="chat-header-info">
                        <button class="auto-scroll-btn active" id="autoScrollBtn" onclick="toggleAutoScroll()" title="Auto-scroll to latest">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="6 9 12 15 18 9"/>
                            </svg>
                            Auto
                        </button>
                        <button class="export-btn" id="exportBtn" onclick="exportLog()" title="Export log as CSV">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            Export
                        </button>
                        <button class="disconnect-btn" id="disconnectBtn" onclick="disconnectBLE()" style="display: none;">
                            Disconnect
                        </button>
                    </div>
                </div>
                <div class="panel-content">
                    <div class="chat-messages-wrapper">
                        <div class="chat-messages" id="chatBox">
                            <!-- Messages will be inserted here -->
                        </div>
                    </div>
                    <div class="chat-input-container">
                        <div class="chat-input-wrapper">
                            <textarea
                                class="chat-input"
                                id="messageInput"
                                placeholder="Enter command or message..."
                                rows="1"
                                onkeydown="handleKeyDown(event)"
                            ></textarea>
                            <button class="send-btn" onclick="sendMessage()" id="sendBtn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <line x1="22" y1="2" x2="11" y2="13"/>
                                    <polygon points="22 2 15 22 11 13 2 9 22 2"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
                <!-- Overlay when not connected -->
                <div class="overlay-message" id="chatOverlay">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <h3>No Device Connected</h3>
                    <p>Scan and connect to a BLE device to start communicating</p>
                </div>
            </section>
        </main>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        // =====================================================
        // Socket.IO Connection
        // =====================================================
        const socket = io();
        let selectedDevice = null;
        let isConnected = false;
        let autoScrollEnabled = true;
        let messageLog = [];

        socket.on("connect", function() {
            console.log("Socket Connected");
        });

        socket.on("status", function(status) {
            updateConnectionStatus(status === "CONNECTED");
        });

        socket.on("message", function(msg) {
            console.log("RX:", msg);
            addMessage(msg, "received", "BLE Device");
        });

        // =====================================================
        // Connection Status Management
        // =====================================================
        function updateConnectionStatus(connected) {
            isConnected = connected;
            const indicator = document.getElementById("statusIndicator");
            const statusText = document.getElementById("statusText");
            const chatOverlay = document.getElementById("chatOverlay");
            const disconnectBtn = document.getElementById("disconnectBtn");

            if (connected) {
                indicator.className = "status-indicator connected";
                statusText.textContent = "CONNECTED";
                chatOverlay.style.display = "none";
                disconnectBtn.style.display = "block";
            } else {
                indicator.className = "status-indicator";
                statusText.textContent = "DISCONNECTED";
                chatOverlay.style.display = "flex";
                disconnectBtn.style.display = "none";
            }
        }

        // =====================================================
        // Toast Notifications
        // =====================================================
        function showToast(message, type = "info") {
            const container = document.getElementById("toastContainer");
            const toast = document.createElement("div");
            toast.className = `toast ${type}`;

            const iconPaths = {
                success: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>',
                error: '<circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>',
                info: '<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>'
            };

            toast.innerHTML = `
                <svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    ${iconPaths[type] || iconPaths.info}
                </svg>
                <span>${message}</span>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = "0";
                toast.style.transform = "translateX(100%)";
                toast.style.transition = "all 0.3s ease";
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        // =====================================================
        // Scan BLE Devices
        // =====================================================
        function scanBLE() {
            const scanBtn = document.getElementById("scanBtn");
            const scanBtnText = document.getElementById("scanBtnText");
            const indicator = document.getElementById("statusIndicator");

            scanBtn.classList.add("scanning");
            scanBtnText.textContent = "Scanning...";
            indicator.className = "status-indicator scanning";

            showToast("Scanning for BLE devices...", "info");

            fetch("/scan_ble")
                .then(response => response.json())
                .then(devices => {
                    scanBtn.classList.remove("scanning");
                    scanBtnText.textContent = "Scan for Devices";
                    if (!isConnected) {
                        indicator.className = "status-indicator";
                    }

                    renderDeviceList(devices);

                    if (devices.length === 0) {
                        showToast("No devices found", "info");
                    } else {
                        showToast(`Found ${devices.length} device${devices.length > 1 ? 's' : ''}`, "success");
                    }
                })
                .catch(error => {
                    scanBtn.classList.remove("scanning");
                    scanBtnText.textContent = "Scan for Devices";
                    indicator.className = "status-indicator";
                    showToast("Scan failed: " + error.message, "error");
                });
        }

        // =====================================================
        // Render Device List
        // =====================================================
        function renderDeviceList(devices) {
            const list = document.getElementById("deviceList");
            const emptyState = document.getElementById("emptyState");

            if (devices.length === 0) {
                list.innerHTML = '';
                list.appendChild(emptyState);
                emptyState.style.display = "flex";
                return;
            }

            list.innerHTML = '';

            devices.forEach((device, index) => {
                const item = document.createElement("div");
                item.className = "device-item";
                item.style.animationDelay = `${index * 0.05}s`;
                item.dataset.address = device.address;

                item.innerHTML = `
                    <div class="device-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="5" y="2" width="14" height="20" rx="2" ry="2"/>
                            <line x1="12" y1="18" x2="12.01" y2="18"/>
                        </svg>
                    </div>
                    <div class="device-info">
                        <div class="device-name">${escapeHtml(device.name)}</div>
                        <div class="device-address">${escapeHtml(device.address)}</div>
                    </div>
                    <button class="connect-btn" onclick="connectToBLE('${escapeHtml(device.address)}', this)">
                        Connect
                    </button>
                `;

                list.appendChild(item);
            });
        }

        // =====================================================
        // Connect to BLE Device
        // =====================================================
        function connectToBLE(address, buttonElement) {
            const deviceItem = buttonElement.closest('.device-item');

            buttonElement.classList.add("connecting");
            buttonElement.textContent = "Connecting...";
            deviceItem.classList.add("connecting");

            showToast("Connecting to device...", "info");

            fetch("/connect_ble", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ address: address })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    selectedDevice = address;
                    buttonElement.classList.remove("connecting");
                    buttonElement.classList.add("connected");
                    buttonElement.textContent = "Connected";
                    deviceItem.classList.remove("connecting");
                    deviceItem.classList.add("connected");

                    updateConnectionStatus(true);
                    showToast("Connected successfully!", "success");

                    // Reset other device buttons
                    document.querySelectorAll('.device-item').forEach(item => {
                        if (item.dataset.address !== address) {
                            const btn = item.querySelector('.connect-btn');
                            btn.classList.remove("connected", "connecting");
                            btn.textContent = "Connect";
                            item.classList.remove("connected", "connecting");
                        }
                    });
                } else {
                    buttonElement.classList.remove("connecting");
                    buttonElement.textContent = "Connect";
                    deviceItem.classList.remove("connecting");
                    showToast("Connection failed: " + data.error, "error");
                }
            })
            .catch(error => {
                buttonElement.classList.remove("connecting");
                buttonElement.textContent = "Connect";
                deviceItem.classList.remove("connecting");
                showToast("Connection error: " + error.message, "error");
            });
        }

        // =====================================================
        // Disconnect BLE
        // =====================================================
        function disconnectBLE() {
            fetch("/disconnect_ble", { method: "POST" })
                .then(response => response.json())
                .then(data => {
                    updateConnectionStatus(false);
                    selectedDevice = null;

                    // Reset all device buttons
                    document.querySelectorAll('.device-item').forEach(item => {
                        const btn = item.querySelector('.connect-btn');
                        btn.classList.remove("connected", "connecting");
                        btn.textContent = "Connect";
                        item.classList.remove("connected", "connecting");
                    });

                    showToast("Disconnected from device", "info");
                });
        }

        // =====================================================
        // Chat Messages
        // =====================================================
        function addMessage(content, type, sender) {
            const chatBox = document.getElementById("chatBox");
            const now = new Date();
            const timestamp = now.toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });

            messageLog.push({
                timestamp: now.toISOString(),
                type: type,
                sender: sender,
                content: content
            });

            const messageDiv = document.createElement("div");
            messageDiv.className = `message ${type}`;

            messageDiv.innerHTML = `
                <div class="message-label">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        ${type === 'sent'
                            ? '<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>'
                            : '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>'}
                    </svg>
                    ${escapeHtml(sender)}
                </div>
                <div class="message-content">${escapeHtml(content)}</div>
                <div class="message-time">${timestamp}</div>
            `;

            chatBox.appendChild(messageDiv);

            if (autoScrollEnabled) {
                chatBox.scrollTop = chatBox.scrollHeight;
            }
        }

        // =====================================================
        // Auto-Scroll Toggle
        // =====================================================
        function toggleAutoScroll() {
            autoScrollEnabled = !autoScrollEnabled;
            const btn = document.getElementById("autoScrollBtn");

            if (autoScrollEnabled) {
                btn.classList.add("active");
                const chatBox = document.getElementById("chatBox");
                chatBox.scrollTop = chatBox.scrollHeight;
                showToast("Auto-scroll enabled", "info");
            } else {
                btn.classList.remove("active");
                showToast("Auto-scroll disabled", "info");
            }
        }

        // =====================================================
        // Export Log to CSV
        // =====================================================
        function exportLog() {
            if (messageLog.length === 0) {
                showToast("No messages to export", "info");
                return;
            }

            const csvHeader = "Timestamp,Direction,Sender,Message\n";
            const csvContent = messageLog.map(msg => {
                const escapedContent = '"' + msg.content.replace(/"/g, '""') + '"';
                return `${msg.timestamp},${msg.type},${msg.sender},${escapedContent}`;
            }).join("\n");

            const csv = csvHeader + csvContent;
            const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
            const url = URL.createObjectURL(blob);

            const link = document.createElement("a");
            link.setAttribute("href", url);
            const filename = `uart_log_${new Date().toISOString().slice(0, 19).replace(/[:-]/g, "")}.csv`;
            link.setAttribute("download", filename);
            link.style.visibility = "hidden";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);

            showToast(`Exported ${messageLog.length} messages to CSV`, "success");
        }

        // =====================================================
        // Send Message
        // =====================================================
        function sendMessage() {
            const input = document.getElementById("messageInput");
            const message = input.value.trim();

            if (message === "" || !isConnected) return;

            socket.send(message);
            addMessage(message, "sent", "You");
            input.value = "";
            input.style.height = "auto";
        }

        function handleKeyDown(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Auto-resize textarea
        document.getElementById("messageInput").addEventListener("input", function() {
            this.style.height = "auto";
            this.style.height = Math.min(this.scrollHeight, 120) + "px";
        });

        // =====================================================
        // Theme Management
        // =====================================================
        function initTheme() {
            const savedTheme = localStorage.getItem("ble-terminal-theme");
            const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            const theme = savedTheme || (prefersDark ? "dark" : "light");
            document.documentElement.setAttribute("data-theme", theme);
        }

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute("data-theme");
            const newTheme = currentTheme === "dark" ? "light" : "dark";

            html.setAttribute("data-theme", newTheme);
            localStorage.setItem("ble-terminal-theme", newTheme);

            showToast(`Switched to ${newTheme} theme`, "info");
        }

        // =====================================================
        // Utility Functions
        // =====================================================
        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        initTheme();
        updateConnectionStatus(false);
    </script>
</body>
</html>
